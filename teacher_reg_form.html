<!DOCTYPE html>
<html>

<head>
    <title>teacher registration form</title>
    <link href="./assests/css/bootstrap.min.css" rel="stylesheet">
    <style>
        div {
            margin-top: 10px;
        }
    </style>
</head>

<body style="background-color: rgb(73, 108, 107);">
    <div class="row" style="height: 150%;">
        <div class="col-5">
            <img src="./assests/images/teacher1.jpg" style="height: 57%;">
        </div>
        <div class="col-7">
            <div class="container">
                <div>
                    <h2>Teacher registration form</h2>
                    <div>Teacher Name:</div>
                    <input type="text" class="from-control" placeholder="first">
                    <input type="text" class="from-control" placeholder="last">
                </div>
                <div>School Name:</div>
                <input type="text" class="from-control" placeholder="" style="width: 380px;">
                <div>Job Title:</div>
                <input type="text" class="from-control" placeholder="" style="width: 380px;">
                <div>School Address:</div>
                <input type="text" class="from-control" placeholder="street address" style="width: 380px;">
                <br>
                <input type="text" class="from-control" placeholder="street address line2"
                    style="width: 380px; margin-top: 10px;;">
                <br>
                <input type="text" class="from-control" placeholder="city" style="margin-top: 10px;">
                <input type="text" class="from-control" placeholder="region">
                <br>
                <input type="text" class="from-control" placeholder="post/ZIP Code" style="margin-top: 10px;">
                <input type="text" class="from-control" placeholder="Romania">
                <br>
                <label style="margin-top: 15px;">Email:</label>
                <input type="text" class="from-control" placeholder="" style="width: 136px;">
                <label>phonen:</label>
                <input type="text" class="from-control" placeholder="#### ### ####" style="width: 136px;">
                <br>
                <div>Course Name:</div>
                <input type="text" class="from-control" placeholder="" style="width:380px;">
                <div>Course Dates:</div>
                <input type="text" class="from-control" placeholder="" style="width:380px;">
                <div>Price:</div>
                <input type="text" class="from-control" placeholder="" style="width:380px;">
                <div>
                    <input type="button" class="btn btn-primary" value="save">
                </div>
            </div>
        </div>
    </div>

</body>

</html>
